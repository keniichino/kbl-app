<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>KBL — Foco</title>
  <meta name="description" content="App personal de foco, escritura y gastos. Plantá un árbol, concentrate, hacelo crecer.">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#8fb4e6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="KBL">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">

  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <main id="app">

    <!-- ============ VISTA: FOCO ============ -->
    <section id="view-foco" class="view active">
      <div class="scene" id="scene">
        <div class="clouds">
          <div class="cloud c1"></div>
          <div class="cloud c2"></div>
          <div class="cloud c3"></div>
        </div>
        <svg id="tree-svg" viewBox="0 0 400 430" aria-label="Árbol de foco"></svg>
        <div class="ambient" id="ambient"></div>
      </div>

      <div class="panel">
        <!-- Estado: sin sesión -->
        <div id="foco-idle">
          <h1 class="panel-title">¿Cuánto vas a enfocarte?</h1>
          <div class="chips" id="duration-chips">
            <button class="chip" data-min="15">15′</button>
            <button class="chip selected" data-min="25">25′</button>
            <button class="chip" data-min="50">50′</button>
            <button class="chip" data-min="90">90′</button>
          </div>
          <p class="species-hint" id="species-hint"></p>
          <button class="btn-primary" id="btn-start">🌱 &nbsp;Plantar</button>
        </div>

        <!-- Estado: sesión activa -->
        <div id="foco-running" hidden>
          <div class="timer-wrap">
            <svg class="ring" viewBox="0 0 120 120">
              <circle class="ring-bg" cx="60" cy="60" r="52"/>
              <circle class="ring-fg" id="ring-progress" cx="60" cy="60" r="52"/>
            </svg>
            <div class="timer-center">
              <div class="time-left" id="time-left">25:00</div>
              <div class="time-label" id="time-label">creciendo…</div>
            </div>
          </div>
          <button class="btn-ghost" id="btn-giveup">Rendirme 🥀</button>
        </div>

        <!-- Estado: sesión completada -->
        <div id="foco-done" hidden>
          <h1 class="panel-title" id="done-title">¡Tu árbol creció! 🎉</h1>
          <p class="done-sub" id="done-sub"></p>
          <button class="btn-primary" id="btn-again">Plantar otro</button>
        </div>
      </div>
    </section>

    <!-- ============ VISTA: BOSQUE ============ -->
    <section id="view-bosque" class="view">
      <header class="view-header">
        <h1>Tu bosque</h1>
        <p class="view-sub" id="bosque-sub"></p>
      </header>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-val" id="stat-hoy">0m</div><div class="stat-key">hoy</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-semana">0m</div><div class="stat-key">semana</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-racha">0</div><div class="stat-key">racha 🔥</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-arboles">0</div><div class="stat-key">árboles</div></div>
      </div>
      <div data-showcase id="sakura-showcase">
        <h2 class="section-title">Tus islas</h2>
        <div class="viewer360" id="viewer-sakura">
          <div class="viewer-hint">arrastrá para girar</div>
        </div>
        <div class="viewer-species" id="viewer-species"></div>
      </div>
      <h2 class="section-title">Especies</h2>
      <div class="species-row" id="species-row"></div>
      <h2 class="section-title">Tus árboles</h2>
      <div class="forest-grid" id="forest-grid"></div>
      <div class="forest-empty" id="forest-empty">
        <div class="empty-emoji">🌱</div>
        <p>Todavía no plantaste nada.<br>Tu primera sesión de foco planta tu primer árbol.</p>
      </div>
    </section>

    <!-- ============ VISTA: GASTOS ============ -->
    <section id="view-gastos" class="view">
      <header class="view-header">
        <h1>Gastos</h1>
        <p class="view-sub" id="gastos-mes-label"></p>
      </header>

      <div class="gasto-hero">
        <div class="gasto-total" id="gasto-total">$ 0</div>
        <div class="gasto-total-sub">este mes</div>
        <div class="gasto-cats-resumen" id="gasto-cats-resumen"></div>
      </div>

      <div class="gasto-form">
        <input id="gasto-monto" type="text" inputmode="decimal" placeholder="$ 0" autocomplete="off">
        <input id="gasto-desc" type="text" placeholder="¿En qué fue? (opcional)" autocomplete="off">
        <div class="cat-chips" id="cat-chips"></div>
        <button class="btn-primary" id="btn-gasto">Agregar gasto</button>
      </div>

      <div class="gastos-lista" id="gastos-lista"></div>
    </section>

    <!-- ============ VISTA: NOTAS ============ -->
    <section id="view-notas" class="view">
      <header class="view-header notas-header">
        <div>
          <h1>Notas</h1>
          <p class="view-sub" id="notas-count"></p>
        </div>
        <button class="btn-circular" id="btn-nueva-nota" aria-label="Nueva nota">＋</button>
      </header>
      <div class="notas-lista" id="notas-lista"></div>
    </section>

    <!-- Editor de nota (overlay a pantalla completa) -->
    <div class="nota-editor" id="nota-editor" hidden>
      <div class="editor-top">
        <button class="editor-volver" id="editor-volver">‹ Notas</button>
        <button class="editor-borrar" id="editor-borrar" aria-label="Borrar nota">Borrar</button>
      </div>
      <input class="editor-titulo" id="editor-titulo" placeholder="Título" autocomplete="off">
      <textarea class="editor-contenido" id="editor-contenido" placeholder="Escribí acá…"></textarea>
      <div class="editor-guardado" id="editor-guardado"></div>
    </div>

    <!-- Tab bar -->
    <nav class="tabbar">
      <button class="tab active" data-view="foco"><span class="tab-icon">🌱</span><span>Foco</span></button>
      <button class="tab" data-view="bosque"><span class="tab-icon">🌳</span><span>Bosque</span></button>
      <button class="tab" data-view="gastos"><span class="tab-icon">💸</span><span>Gastos</span></button>
      <button class="tab" data-view="notas"><span class="tab-icon">✍️</span><span>Notas</span></button>
    </nav>
  </main>

  <div id="confetti-layer"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
